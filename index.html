<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TravelMate AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css"/>

  <style>
    :root{
      --primary:#9333ea;
      --secondary:#c084fc;
      --accent:#d946ef;
      --dark:#3b0764;
      --light:#faf5ff;
      --white:#ffffff;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:22px;

      background:
        radial-gradient(circle at top left, #ffffff 0%, #faf5ff 35%, #e9d5ff 70%),
        radial-gradient(circle at bottom right, #c084fc 0%, #ffffff 55%);
    }

    body::before{
      content:"";
      position:absolute;
      width:200%;
      height:200%;
      background:linear-gradient(
        45deg,
        rgba(147,51,234,0.12),
        rgba(255,255,255,0),
        rgba(217,70,239,0.12)
      );
      animation:moveBg 18s linear infinite;
      z-index:0;
    }

    @keyframes moveBg{
      from{ transform:translate(-10%,-10%) rotate(0deg); }
      to{ transform:translate(-10%,-10%) rotate(360deg); }
    }

    .chat-container{
      position:relative;
      z-index:1;

      width:min(95vw, 750px);
      height:min(95vh, 950px);

      border-radius:46px;
      overflow:hidden;

      background:rgba(255,255,255,0.76);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);

      border:1px solid rgba(255,255,255,0.55);

      box-shadow:
        0 25px 75px rgba(126,34,206,0.22),
        inset 0 1px 0 rgba(255,255,255,0.9);

      animation:float 6s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    .custom-header{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      padding:22px 24px 16px;
      z-index:1000;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;

      background:linear-gradient(135deg,#ffffff,#faf5ff,#f3e8ff);
      border-bottom:1px solid rgba(147,51,234,0.16);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:50px;
      height:50px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:27px;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:white;
      box-shadow:0 8px 24px rgba(147,51,234,0.30);
    }

    .brand h1{
      font-size:24px;
      color:var(--dark);
      line-height:1.1;
    }

    .brand p{
      margin-top:5px;
      font-size:13px;
      font-weight:500;
      color:#7e22ce;
    }

    .mode-toggle{
      border:none;
      border-radius:18px;
      padding:12px 14px;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      font-size:18px;
      box-shadow:0 8px 22px rgba(147,51,234,0.25);
      transition:0.25s;
    }

    .mode-toggle:hover{
      transform:scale(1.06);
    }

    /* Dunklen Standard-Header der Chatroom-Bibliothek ausblenden */
    .chatroom .chat-header,
    .chatroom .header,
    .chatroom .titlebar{
      display:none !important;
    }

    .chatroom{
      margin-top:98px !important;
      height:calc(100% - 98px) !important;
      background:transparent !important;
    }

    .chatroom .messages{
      padding:28px !important;
    }

    .chatroom .message.left .bubble{
      background:rgba(255,255,255,0.95) !important;
      color:var(--dark) !important;
      border:1px solid rgba(147,51,234,0.18);
      border-radius:28px 28px 28px 10px !important;
      box-shadow:0 8px 24px rgba(126,34,206,0.10);
    }

    .chatroom .message.right .bubble{
      background:linear-gradient(135deg,var(--primary),var(--accent)) !important;
      color:white !important;
      border-radius:28px 28px 10px 28px !important;
      box-shadow:0 8px 24px rgba(147,51,234,0.30);
    }

    .chatroom .input{
      background:rgba(255,255,255,0.90) !important;
      backdrop-filter:blur(16px);
      border-top:1px solid rgba(147,51,234,0.18);
      padding:18px !important;
    }

    .chatroom input{
      background:rgba(255,255,255,0.98) !important;
      border:1px solid rgba(147,51,234,0.25) !important;
      color:var(--dark) !important;
      border-radius:24px !important;
      padding:18px !important;
      font-size:16px;
      outline:none !important;
    }

    .chatroom input:focus{
      border-color:rgba(147,51,234,0.55) !important;
      box-shadow:0 0 0 4px rgba(147,51,234,0.10);
    }

    .chatroom input::placeholder{
      color:rgba(59,7,100,0.45);
    }

    .chatroom .send{
      background:linear-gradient(135deg,var(--primary),var(--accent)) !important;
      border:none !important;
      border-radius:24px !important;
      box-shadow:0 8px 22px rgba(147,51,234,0.25);
      transition:0.25s;
    }

    .chatroom .send:hover{
      transform:scale(1.06);
      box-shadow:0 0 22px rgba(147,51,234,0.42);
    }

    body.dark{
      background:
        radial-gradient(circle at top left, #3b0764 0%, #581c87 40%, #111827 80%),
        radial-gradient(circle at bottom right, #9333ea 0%, #111827 60%);
    }

    body.dark .chat-container{
      background:rgba(30,15,45,0.78);
      border:1px solid rgba(216,180,254,0.24);
    }

    body.dark .custom-header{
      background:linear-gradient(135deg,#3b0764,#581c87,#7e22ce);
      border-bottom:1px solid rgba(255,255,255,0.15);
    }

    body.dark .brand h1,
    body.dark .brand p{
      color:white;
    }

    body.dark .chatroom .message.left .bubble{
      background:rgba(255,255,255,0.12) !important;
      color:white !important;
      border:1px solid rgba(255,255,255,0.15);
    }

    body.dark .chatroom .input{
      background:rgba(30,15,45,0.84) !important;
    }

    body.dark .chatroom input{
      background:rgba(255,255,255,0.12) !important;
      color:white !important;
      border:1px solid rgba(255,255,255,0.20) !important;
    }

    body.dark .chatroom input::placeholder{
      color:rgba(255,255,255,0.55);
    }

    ::-webkit-scrollbar{
      width:7px;
    }

    ::-webkit-scrollbar-thumb{
      background:rgba(147,51,234,0.35);
      border-radius:12px;
    }

    @media(max-width:600px){
      body{
        padding:10px;
      }

      .chat-container{
        width:100%;
        height:95vh;
        border-radius:32px;
      }

      .custom-header{
        padding:17px 16px 13px;
      }

      .logo{
        width:43px;
        height:43px;
        font-size:23px;
        border-radius:15px;
      }

      .brand h1{
        font-size:18px;
      }

      .brand p{
        font-size:11px;
      }

      .mode-toggle{
        padding:10px 11px;
        font-size:16px;
      }

      .chatroom{
        margin-top:88px !important;
        height:calc(100% - 88px) !important;
      }

      .chatroom .messages{
        padding:18px !important;
      }
    }
  </style>
</head>

<body>

  <div class="chat-container">
    <div class="custom-header">
      <div class="brand">
        <div class="logo">🌍</div>
        <div>
          <h1>TravelMate AI</h1>
          <p>📍 Orte • 🏛️ Sehenswürdigkeiten • 🌦️ Wetter</p>
        </div>
      </div>

      <button class="mode-toggle" id="modeToggle" title="Light/Dark Mode wechseln">🌙</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    var chatroom = new window.Chatroom({
      host: "https://urban-halibut-r4jw49wq7gv7fw545-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      speechRecognition: "de-DE",
      welcomeMessage:
        "😊 Hallo! Ich bin TravelMate AI. Ich helfe dir mit Wetterdaten, Sehenswürdigkeiten und Ortsinformationen."
    });

    chatroom.openChat();

    const modeToggle = document.getElementById("modeToggle");

    modeToggle.addEventListener("click", function(){
      document.body.classList.toggle("dark");

      if(document.body.classList.contains("dark")){
        modeToggle.textContent = "☀️";
      }else{
        modeToggle.textContent = "🌙";
      }
    });
  </script>

</body>
</html>
