<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelMate AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css"/>

<style>
:root{
  --primary:#9333ea;
  --accent:#d946ef;
  --dark:#3b0764;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffffff,#f3e8ff,#e9d5ff);
  display:flex;
  justify-content:center;
  align-items:center;
}

.app-container{
  width:min(95vw,900px);
  height:95vh;
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(147,51,234,.2);
  box-shadow:0 20px 60px rgba(147,51,234,.15);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* Feste sichtbare Überschrift */
.custom-header{
  height:105px;
  min-height:105px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 32px;
  background:linear-gradient(135deg,#9333ea,#c084fc,#d946ef);
  color:white;
  border-radius:0;
  z-index:9999;
}

.logo-area h1{
  font-size:30px;
  font-weight:700;
  line-height:1.1;
}

.logo-area p{
  font-size:14px;
  margin-top:8px;
  font-weight:500;
}

.header-smiley{
  font-size:34px;
}

.chat-box{
  flex:1;
  min-height:0;
  background:transparent;
}

/* Dunkle Standard-Überschrift der Chatroom-Bibliothek entfernen */
.chatroom .chat-header,
.chatroom .header,
.chatroom .titlebar,
.chatroom h1,
.chatroom h2{
  display:none !important;
}

.chatroom{
  height:100% !important;
  margin-top:0 !important;
  background:transparent !important;
}

.chatroom .messages{
  padding:24px !important;
}

.chatroom .message.left .bubble{
  background:rgba(255,255,255,0.96) !important;
  color:var(--dark) !important;
  border:1px solid rgba(147,51,234,.18);
  border-radius:0 !important;
  box-shadow:0 6px 18px rgba(147,51,234,.08);
}

.chatroom .message.right .bubble{
  background:linear-gradient(135deg,#9333ea,#d946ef) !important;
  color:white !important;
  border-radius:0 !important;
}

.chatroom .input{
  background:rgba(255,255,255,0.92) !important;
  border-top:1px solid rgba(147,51,234,.18);
  padding:18px !important;
}

.chatroom input{
  border:1px solid rgba(147,51,234,.25) !important;
  color:var(--dark) !important;
  border-radius:0 !important;
  padding:16px !important;
  font-size:16px;
}

.chatroom .send{
  background:linear-gradient(135deg,#9333ea,#d946ef) !important;
  border-radius:0 !important;
}

@media(max-width:600px){
  .app-container{
    width:100%;
    height:100vh;
  }

  .custom-header{
    height:95px;
    min-height:95px;
    padding:18px;
  }

  .logo-area h1{
    font-size:22px;
  }

  .logo-area p{
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="app-container">

  <div class="custom-header">
    <div class="logo-area">
      <h1>🌍 TravelMate AI</h1>
      <p>📍 Orte • 🏛️ Sehenswürdigkeiten • 🌦️ Wetter</p>
    </div>

    <div class="header-smiley">😊</div>
  </div>

  <div class="chat-box"></div>

</div>

<script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

<script>
var chatroom = new window.Chatroom({
  host: "https://urban-halibut-r4jw49wq7gv7fw545-5005.app.github.dev",
  title: "Chatbot",
  container: document.querySelector(".chat-box"),
  speechRecognition: "de-DE",
  welcomeMessage:
  "😊 Hallo! Ich bin TravelMate AI. Ich helfe dir mit Wetterdaten, Sehenswürdigkeiten und Ortsinformationen."
});

chatroom.openChat();
</script>

</body>
</html>
